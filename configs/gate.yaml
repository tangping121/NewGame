# Gate 监听地址（进程 bind）；生产请另配 advertise_tcp_addr 为 LB/域名
name: gate
type: gate
http_addr: ":9001"
tcp_addr: ":9000"
# advertise_tcp_addr: "gate.zone1.example.com:9000"   # Login 返回的 gate_addr
# advertise_http_addr: "gate.zone1.example.com:9001" # 跨分片 /internal/push
zone_id: 1
zone_mode: dedicated
max_conn_per_ip: 32
log_level: info
infra:
  redis: "127.0.0.1:6379"
  postgres: "postgres://newgame:newgame@127.0.0.1:5432/newgame?sslmode=disable"
  nats: "nats://127.0.0.1:4222"
discovery:
  enabled: true
  ttl_sec: 15
  heartbeat_sec: 5
